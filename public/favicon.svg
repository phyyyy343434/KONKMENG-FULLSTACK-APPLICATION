<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Filled circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)"/>
  
  <!-- Face elements in white -->
  <!-- Hair swoosh -->
  <path d="M 32 28 Q 50 18, 68 32" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  
  <!-- Left ear -->
  <path d="M 18 48 Q 14 52, 18 56" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Left eye -->
  <circle cx="38" cy="48" r="3.5" fill="white"/>
  
  <!-- Right eye -->
  <circle cx="62" cy="48" r="3.5" fill="white"/>
  
  <!-- Smile -->
  <path d="M 35 62 Q 50 72, 65 62" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>
