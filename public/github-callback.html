<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Login - KONKMENG</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            color: white;
        }
        h1 {
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Processing GitHub Login...</h1>
        <div class="spinner"></div>
    </div>

    <script>
        // Get authorization code from URL
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');

        if (error) {
            alert('GitHub login failed: ' + error);
            window.location.href = '/';
        } else if (code) {
            // Call the parent window's handler
            if (window.opener) {
                // If opened as popup
                window.opener.handleGitHubCallback(code);
                window.close();
            } else {
                // If direct redirect, store code and redirect back
                localStorage.setItem('github_code', code);
                window.location.href = '/?github_callback=' + code;
            }
        } else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
