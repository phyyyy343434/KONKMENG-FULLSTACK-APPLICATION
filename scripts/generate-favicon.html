<!DOCTYPE html>
<html>
<head>
    <title>Generate KONKMENG Favicon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        canvas {
            border: 1px solid #ccc;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>
    <h1>KONKMENG Favicon Generator</h1>
    <p>This will generate favicon images based on your logo.</p>
    
    <h2>Preview:</h2>
    <canvas id="canvas" width="512" height="512"></canvas>
    
    <div>
        <button onclick="downloadPNG(32)">Download 32x32 PNG</button>
        <button onclick="downloadPNG(180)">Download 180x180 PNG (Apple)</button>
        <button onclick="downloadPNG(512)">Download 512x512 PNG</button>
    </div>
    
    <h3>Instructions:</h3>
    <ol>
        <li>Click the buttons above to download PNG files</li>
        <li>Save them to the <code>public/</code> folder</li>
        <li>Use an online tool like <a href="https://favicon.io/favicon-converter/" target="_blank">favicon.io</a> to convert PNG to ICO</li>
    </ol>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Draw the KONKMENG logo
        function drawLogo() {
            // Clear canvas
            ctx.clearRect(0, 0, 512, 512);
            
            // Set color
            ctx.fillStyle = '#4f46e5';
            ctx.strokeStyle = '#4f46e5';
            
            // Draw curved swoosh shape
            ctx.beginPath();
            ctx.moveTo(128, 230);
            ctx.quadraticCurveTo(230, 128, 332, 230);
            ctx.quadraticCurveTo(281, 332, 230, 358);
            ctx.quadraticCurveTo(179, 332, 128, 230);
            ctx.closePath();
            ctx.fill();
            
            // Draw small dot
            ctx.beginPath();
            ctx.arc(153, 194, 18, 0, Math.PI * 2);
            ctx.fill();
        }
        
        drawLogo();
        
        function downloadPNG(size) {
            // Create a temporary canvas with the desired size
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = size;
            tempCanvas.height = size;
            const tempCtx = tempCanvas.getContext('2d');
            
            // Scale and draw the logo
            tempCtx.scale(size / 512, size / 512);
            tempCtx.fillStyle = '#4f46e5';
            
            // Draw curved swoosh shape
            tempCtx.beginPath();
            tempCtx.moveTo(128, 230);
            tempCtx.quadraticCurveTo(230, 128, 332, 230);
            tempCtx.quadraticCurveTo(281, 332, 230, 358);
            tempCtx.quadraticCurveTo(179, 332, 128, 230);
            tempCtx.closePath();
            tempCtx.fill();
            
            // Draw small dot
            tempCtx.beginPath();
            tempCtx.arc(153, 194, 18, 0, Math.PI * 2);
            tempCtx.fill();
            
            // Download
            tempCanvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = size === 180 ? 'apple-touch-icon.png' : `favicon-${size}x${size}.png`;
                a.click();
                URL.revokeObjectURL(url);
            });
        }
    </script>
</body>
</html>
